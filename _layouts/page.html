---
layout: default
---

<section class="page-shell">
  <header class="page-header">
    <p class="eyebrow">{{ page.eyebrow | default: site.title }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="page-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>
  <div class="content">
    {{ content }}
  </div>
</section>
