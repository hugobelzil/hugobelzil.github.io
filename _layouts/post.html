---
layout: default
---

<article class="page-shell post">
  <header class="page-header">
    <p class="eyebrow">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="page-subtitle">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="content">
    {{ content }}
  </div>
</article>
